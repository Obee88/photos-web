name: deploy
on:
  push:
    branches: [main]
jobs:
  build-and-notify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        run: echo "sha=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/obee88/photos-web:${{ steps.meta.outputs.sha }}
            ghcr.io/obee88/photos-web:latest
      - name: Notify dashboard
        env:
          URL:    ${{ secrets.WEBHOOK_URL }}
          SECRET: ${{ secrets.WEBHOOK_SECRET }}
          SHA:    ${{ steps.meta.outputs.sha }}
        run: |
          BODY=$(jq -nc \
            --arg sha "$SHA" \
            --arg ref "$GITHUB_REF" \
            --arg image "ghcr.io/obee88/photos-web:$SHA" \
            --argjson ts $(date +%s) \
            '{sha:$sha, ref:$ref, image:$image, timestamp:$ts}')
          SIG=$(printf '%s' "$BODY" | openssl dgst -sha256 -hmac "$SECRET" -binary | xxd -p -c 256)
          curl -fsS -X POST "$URL" \
            -H "Content-Type: application/json" \
            -H "X-Signature: sha256=$SIG" \
            -d "$BODY"
